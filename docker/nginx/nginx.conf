# Le stub sera ensuite auto-détruit.

server {
  listen 80;
  server_name _;

  root /var/www/html/public;
  index index.php;

  # Empêche l'accès aux fichiers cachés (commençant par un point)
  location ~ /\. {
      deny all;
  }

  # Gestion des fichiers statiques avec une mise en cache prolongée
  location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      expires 1y;
      add_header Cache-Control "public, immutable";
  }

  # Gère les requêtes générales
  location / {
      # Tente de servir le fichier demandé, sinon tente l'index.php (standard Laravel)
      try_files $uri $uri/ /index.php?$query_string;
  }

  # Traite tous les fichiers .php via PHP-FPM
  location ~ \.php$ {
      # Vérifie si le fichier PHP existe
      try_files $uri =404;

      # Paramètres de base pour PHP-FPM
      fastcgi_split_path_info ^(.+\.php)(/.+)$;

      # MODIFIÉ: Utilise le token pour le nom du service
      fastcgi_pass chess_laravel_server:9000;

      fastcgi_index index.php;
      include fastcgi_params;

      # Le paramètre SCRIPT_FILENAME est essentiel
      fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
  }
}